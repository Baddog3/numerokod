<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@400;500&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 1200px;
      height: 630px;
      overflow: hidden;
      font-family: 'DM Sans', sans-serif;
      background: #0f0c1a;
      color: #e8e0f0;
      position: relative;
    }

    body::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image:
        radial-gradient(1px 1px at 10% 20%, rgba(255,255,255,0.45) 0%, transparent 100%),
        radial-gradient(1px 1px at 30% 60%, rgba(255,255,255,0.35) 0%, transparent 100%),
        radial-gradient(1px 1px at 50% 10%, rgba(255,255,255,0.5) 0%, transparent 100%),
        radial-gradient(1px 1px at 70% 40%, rgba(255,255,255,0.35) 0%, transparent 100%),
        radial-gradient(1px 1px at 90% 80%, rgba(255,255,255,0.4) 0%, transparent 100%),
        radial-gradient(1px 1px at 15% 85%, rgba(255,255,255,0.25) 0%, transparent 100%),
        radial-gradient(1px 1px at 45% 45%, rgba(255,255,255,0.3) 0%, transparent 100%),
        radial-gradient(1px 1px at 85% 15%, rgba(255,255,255,0.35) 0%, transparent 100%);
      pointer-events: none;
    }

    .glow {
      position: absolute;
      width: 520px;
      height: 520px;
      right: -80px;
      top: 50%;
      transform: translateY(-50%);
      border-radius: 50%;
      background: radial-gradient(circle, rgba(200, 169, 110, 0.18) 0%, transparent 70%);
      pointer-events: none;
    }

    .frame {
      position: relative;
      z-index: 1;
      width: 100%;
      height: 100%;
      padding: 72px 88px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      border: 1px solid rgba(45, 37, 80, 0.9);
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 48px;
      font-family: 'Playfair Display', serif;
      font-size: 42px;
      font-weight: 700;
      color: #c8a96e;
    }

    .logo-symbol {
      width: 46px;
      height: 46px;
      display: block;
      filter: drop-shadow(0 0 24px rgba(200, 169, 110, 0.45));
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: 72px;
      line-height: 1.12;
      font-weight: 700;
      max-width: 820px;
      margin-bottom: 28px;
      color: #e8e0f0;
    }

    p {
      font-size: 30px;
      line-height: 1.45;
      color: #9985b0;
      max-width: 760px;
    }

    .accent-line {
      width: 120px;
      height: 3px;
      margin-top: 40px;
      background: linear-gradient(90deg, #c8a96e, rgba(200, 169, 110, 0.2));
      border-radius: 2px;
    }

    .domain {
      position: absolute;
      right: 88px;
      bottom: 72px;
      font-size: 24px;
      letter-spacing: 0.04em;
      color: rgba(200, 169, 110, 0.75);
    }
  </style>
</head>
<body>
  <div class="glow"></div>
  <div class="frame">
    <div class="logo">
      <img class="logo-symbol" src="logo-symbol.svg" alt="" width="42" height="42">
      <span>numerokod</span>
    </div>
    <h1>Узнай своё число судьбы</h1>
    <p>Бесплатные нумерологические расчёты онлайн</p>
    <div class="accent-line"></div>
    <div class="domain">numerokod.ru</div>
  </div>
</body>
</html>
